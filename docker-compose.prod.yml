services:
  postgres:
    image: postgres:16-alpine
    container_name: proofping-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - proofping-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proofping-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - proofping-evidence-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: proofping-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - proofping-caddy-data:/data
      - proofping-caddy-config:/config

volumes:
  proofping-postgres-data:
  proofping-evidence-storage:
  proofping-caddy-data:
  proofping-caddy-config:
