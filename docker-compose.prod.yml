services:
  postgres:
    image: postgres:16-alpine
    container_name: proofping-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - proofping-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proofping-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - proofping-evidence-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - proxy
    expose:
      - "3000"

volumes:
  proofping-postgres-data:
  proofping-evidence-storage:

networks:
  proxy:
    external: true
    name: childsafe-uganda_default
