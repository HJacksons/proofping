name: Deploy ProofPing

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: proofping-production-deploy
  cancel-in-progress: false

jobs:
  checks:
    name: Build and check
    runs-on: ubuntu-latest

    env:
      APP_URL: https://getproofping.com
      DATABASE_URL: postgresql://proofping:proofping@localhost:5432/proofping?schema=public
      ENABLE_DEMO_AUTH: "false"
      AUTH_SECRET: ci-build-only-secret-not-for-production
      AUTH_LINK_DELIVERY: response
      ADMIN_EMAIL: admin@example.test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/proofping_deploy_key
          chmod 600 ~/.ssh/proofping_deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/proofping_deploy_key "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" 'bash -s' <<'EOF'
            set -euo pipefail

            APP_DIR="${PROOFPING_APP_DIR:-$HOME/apps/proofping}"
            cd "$APP_DIR"

            echo "Creating database backup..."
            mkdir -p "$HOME/backups"
            docker compose -f docker-compose.prod.yml exec -T postgres \
              pg_dump -U proofping proofping < /dev/null \
              | gzip > "$HOME/backups/proofping-$(date +%F-%H%M%S).sql.gz" || true

            echo "Syncing latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "Building and restarting containers..."
            docker compose -f docker-compose.prod.yml up -d --build

            echo "Waiting for app health..."
            for attempt in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T app \
                node -e "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" < /dev/null; then
                echo "Health check passed."
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "Health check failed."
                docker compose -f docker-compose.prod.yml logs --tail=120 app
                exit 1
              fi

              sleep 2
            done

            echo "Container status..."
            docker compose -f docker-compose.prod.yml ps

            echo "Deployment finished."
          EOF
